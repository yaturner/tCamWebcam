<!DOCTYPE html>
<html>
<head>
    <title>Bambu Labs A1 Stream</title>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; background: #222; color: #fff; }
        .container { margin-top: 30px; }
        
        /* Controls wrapper styling */
        .controls { margin-bottom: 20px; }
        select { 
            padding: 8px 12px; 
            font-size: 14px; 
            background: #444; 
            color: #fff; 
            border: 1px solid #555; 
            border-radius: 4px;
            cursor: pointer;
        }

        .stream-wrapper {
            display: inline-flex;
            align-items: stretch;
            justify-content: center;
            gap: 15px;
        }

        img { border: 4px solid #555; border-radius: 8px; max-width: 100%; height: auto; display: block; }

        .colorbar-container {
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            font-weight: bold;
            font-size: 14px;
        }

        .colorbar {
            width: 25px;
            flex-grow: 1;
            margin: 5px 0;
            border: 2px solid #555;
            border-radius: 4px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Bambu Labs A1 Web Feed</h1>
        
        <div class="controls">
            <label for="palette-select">Choose Palette: </label>
            <select id="palette-select">
                </select>
        </div>
        
        <div class="stream-wrapper">
            <img src="/video_feed" alt="Raspberry Pi Live Stream" />

            <div class="colorbar-container">
                <div id="min-label" class="label">--</div>
                <div id="color-bar" class="colorbar"></div>
                <div id="max-label" class="label">--</div>
            </div>
        </div>
    </div>

    <script>
let dropdownPopulated = false;

function updateColorbar() {
    fetch('/colorbar_config')
        .then(response => {
            if (!response.ok) throw new Error("Server went down");
            return response.json();
        })
        .then(data => {
            const selectEl = document.getElementById('palette-select');
            
            // 🚀 FIX 1: If the server restarted, clear and rebuild options dynamically
            if (!dropdownPopulated || selectEl.children.length === 0) {
                selectEl.innerHTML = ""; // Wipe old stale options
                data.all_palettes.forEach(name => {
                    let option = document.createElement('option');
                    option.value = name;
                    option.innerText = name;
                    if (name === data.current_palette) option.selected = true;
                    selectEl.appendChild(option);
                });
                dropdownPopulated = true;
            }

            // Update text labels and gradient strip smoothly
            document.getElementById('max-label').innerText = data.max_val;
            document.getElementById('min-label').innerText = data.min_val;
            const gradientColors = data.palette_colors.join(', ');
            document.getElementById('color-bar').style.background = `linear-gradient(to bottom, ${gradientColors})`;
        })
        .catch(err => {
            console.warn('Lost connection to webcam.py. Retrying...');
            
            // 🚀 FIX 2: If server dies, reset memory flags so it rebuilds properly on wake
            dropdownPopulated = false; 
            
            // Force the broken video element to re-hook its stream source when server wakes up
            const img = document.getElementById('stream-img');
            if (img) {
                // Appending a random timestamp parameter trick forces the browser to reconnect
                img.src = "/video_feed?t=" + new Date().getTime();
            }
        });
}

// Keep the lifecycle loop active so it self-heals the moment python comes back online
setInterval(updateColorbar, 2000);
    </script>
</body>
</html>
